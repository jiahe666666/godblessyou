spring:
  application:
    name: lottery-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:lottery_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:lottery}
    password: ${DB_PASSWORD:lottery123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  mail:
    host: ${SMTP_HOST:postfix}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:noreply@example.com}
    password: ${SMTP_PASS:changeit}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
        debug: ${MAIL_DEBUG:false}

server:
  port: ${SERVER_PORT:8080}

logging:
  file:
    path: /logs
  level:
    root: INFO
    com.godblessyou.lottery: DEBUG

lottery:
  mail:
    from: ${SMTP_FROM:${SMTP_USER:noreply@example.com}}
    retry-delay-ms: ${MAIL_RETRY_DELAY_MS:300000}
    verification-expire-minutes: ${MAIL_VERIFICATION_EXPIRE_MINUTES:10}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-32-byte-value}
    access-expire-seconds: ${JWT_ACCESS_EXPIRE_SECONDS:7200}
    refresh-expire-seconds: ${JWT_REFRESH_EXPIRE_SECONDS:604800}
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  rules:
    daily-limit: ${LOTTERY_DAILY_LIMIT:10}
    cooldown-seconds: ${LOTTERY_COOLDOWN_SECONDS:5}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  bootstrap:
    admin:
      username: ${ADMIN_USERNAME:}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html