services:
  mysql:
    image: mysql:8.0
    container_name: lottery-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-lottery_system}
      MYSQL_USER: ${DB_USERNAME:-lottery}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lottery123}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lottery-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postfix:
    image: boky/postfix:latest
    container_name: lottery-postfix
    restart: unless-stopped
    profiles:
      - mail
    environment:
      ALLOWED_SENDER_DOMAINS: ${POSTFIX_DOMAIN:-example.com}
      HOSTNAME: mail.${POSTFIX_DOMAIN:-example.com}
    ports:
      - "${SMTP_PORT:-587}:587"
      - "${SMTP_SSL_PORT:-465}:465"

  backend:
    build:
      context: ./backend
    container_name: lottery-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-lottery_system}
      DB_USERNAME: ${DB_USERNAME:-lottery}
      DB_PASSWORD: ${DB_PASSWORD:-lottery123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST:-postfix}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-noreply@example.com}
      SMTP_PASS: ${SMTP_PASS:-changeit}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      MAIL_DEBUG: ${MAIL_DEBUG:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      LOTTERY_DAILY_LIMIT: ${LOTTERY_DAILY_LIMIT:-10}
      LOTTERY_COOLDOWN_SECONDS: ${LOTTERY_COOLDOWN_SECONDS:-5}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: lottery-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  backend_logs: